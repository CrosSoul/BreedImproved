l_simp_chinese:
 breedimp_p3_proto_manage_matchmaking_decision: "管理宗族婚配（原型）"
 breedimp_p3_proto_manage_matchmaking_decision_tooltip: "打开隔离的 Phase 3 婚配原型。"
 breedimp_p3_proto_manage_matchmaking_decision_desc: "测试仅限宗族族长使用的宗族内婚姻与订婚规划流程。本原型在每个存档中只能正式启动一次。"
 breedimp_p3_proto_manage_matchmaking_decision_confirm: "打开原型"
 breedimp_p3_proto_manage_matchmaking_decision_invalid_tt: "你必须是仍然在世的玩家宗族族长，且本存档尚未消耗原型工作流。"

 breedimp_p3_proto_matchmaking.1000.t: "Phase 3 原型启动"
 breedimp_p3_proto_matchmaking.1000.desc: "正式启动后，Breed Improved 将只在本次工作流中赋予临时宗族婚配权，同时永久消耗本存档唯一的一次原型运行机会。在此页面取消不会消耗机会。"
 breedimp_p3_proto_matchmaking.1000.a: "启动隔离工作流。"
 breedimp_p3_proto_matchmaking.1000.a.tt: "消耗本存档的唯一运行机会，记录当前宗族，并开始分阶段审查候选配对。"
 breedimp_p3_proto_matchmaking.1000.b: "在启动前取消。"
 breedimp_p3_proto_matchmaking.1000.b.tt: "关闭入口确认，不创建工作流状态，也不消耗存档级锁。"

 breedimp_p3_proto_matchmaking.1020.t: "原型婚配审查"
 breedimp_p3_proto_matchmaking.1020.desc: "待婚配者：[breedimp_p3_proto_current_subject.GetShortUIName]，年龄 [breedimp_p3_proto_current_subject.GetAge]\n拟议配偶：[breedimp_p3_proto_current_partner.GetShortUIName]，年龄 [breedimp_p3_proto_current_partner.GetAge]"
 breedimp_p3_proto_matchmaking.1020.type.marriage: "计划关系：婚姻。"
 breedimp_p3_proto_matchmaking.1020.type.betrothal: "计划关系：订婚，因为至少一方尚未成年。"
 breedimp_p3_proto_matchmaking.1020.diagnostics: "原型诊断——宗族成员：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_dynasty_member_count').GetValue|0]；合格待婚配者：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_subject_count').GetValue|0]；当前合法性检查：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_current_legality_check_count').GetValue|0]；合法排序候选：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_current_sort_candidate_count').GetValue|0]；当前分阶段候选池中的配偶：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_current_partner_count').GetValue|0]；已接受配对：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_accepted_pair_count').GetValue|0]/16。"
 breedimp_p3_proto_matchmaking.1020.a: "接受为普通结合。"
 breedimp_p3_proto_matchmaking.1020.a.tt: "以普通方向保存此配对。最终确认之前不会建立婚姻或订婚。"
 breedimp_p3_proto_matchmaking.1020.b: "接受为母系结合。"
 breedimp_p3_proto_matchmaking.1020.b.tt: "以母系方向保存此配对。最终确认之前不会建立婚姻或订婚。"
 breedimp_p3_proto_matchmaking.1020.c: "为此人换一位候选配偶。"
 breedimp_p3_proto_matchmaking.1020.c.tt: "只否决当前为此人展示的配偶，并选择下一位分阶段候选人。"
 breedimp_p3_proto_matchmaking.1020.d: "跳过此配对及待婚配者。"
 breedimp_p3_proto_matchmaking.1020.d.tt: "不接受当前配对，并继续审查另一位待婚配者。"
 breedimp_p3_proto_matchmaking.1020.e: "暂缓此人。"
 breedimp_p3_proto_matchmaking.1020.e.tt: "将此人移至所有尚未审查者之后，稍后再审查一次。"
 breedimp_p3_proto_matchmaking.1020.f: "提前结束审查。"
 breedimp_p3_proto_matchmaking.1020.f.tt: "只保留已经接受的配对并进入最终确认；若尚未接受任何配对，则不建立关系并结束。"
 breedimp_p3_proto_matchmaking.1020.g: "取消整个工作流。"
 breedimp_p3_proto_matchmaking.1020.g.tt: "丢弃全部临时计划，本存档中不再授予工作流权限。不会建立任何关系。"

 breedimp_p3_proto_matchmaking.1100.t: "确认原型婚配计划"
 breedimp_p3_proto_matchmaking.1100.desc: "请审阅完整的临时计划。最终确认会先预检每个已提交槽位及所有跨槽位占用；只要一组配对失败，整批计划就会在建立任何关系之前停止。"
 breedimp_p3_proto_matchmaking.1100.diagnostics: "已接受配对：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_accepted_pair_count').GetValue|0]/16。每一行都记录待婚配者、配偶、关系类型、婚姻方向和占位状态。"
