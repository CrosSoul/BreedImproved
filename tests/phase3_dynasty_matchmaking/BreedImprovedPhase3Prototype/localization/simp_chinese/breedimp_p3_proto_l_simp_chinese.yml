 breedimp_p3_proto_matchmaking.1142.desc: "完整计划在第一项关系操作之前被拒绝。本批次没有建立任何婚姻或订婚。"
 breedimp_p3_proto_matchmaking.1142.slot_00: "失败位置：工作流级验证。"
