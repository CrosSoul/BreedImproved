 breedimp_p3_proto_matchmaking.1143.t: "已达到原型容量"
 breedimp_p3_proto_matchmaking.1143.desc: "16 个原型配对槽位已全部提交。第 17 组配对不能覆盖、循环复用或截断现有记录。此时尚未建立任何关系。"
 breedimp_p3_proto_matchmaking.1143.a: "审阅完整计划。"
 breedimp_p3_proto_matchmaking.1143.a.tt: "带着恰好 16 组已提交配对进入最终确认。"
