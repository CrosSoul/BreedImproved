 breedimp_p3_proto_matchmaking.1100.a: "确认整个计划。"
 breedimp_p3_proto_matchmaking.1100.a.tt: "先预检每组配对；只有完整计划仍然有效时，才执行全部关系。"
 breedimp_p3_proto_matchmaking.1100.b: "取消，不建立关系。"
 breedimp_p3_proto_matchmaking.1100.b.tt: "丢弃计划并清理临时工作流。永久的一次性运行锁仍保持已消耗。"

 breedimp_p3_proto_matchmaking.1140.t: "没有原型待婚配者"
 breedimp_p3_proto_matchmaking.1140.desc: "没有宗族成员符合待婚配者条件。临时工作流已清理；本存档的原型运行机会仍保持已消耗。"
 breedimp_p3_proto_matchmaking.1140.a: "结束原型。"

 breedimp_p3_proto_matchmaking.1141.t: "没有已接受配对"
 breedimp_p3_proto_matchmaking.1141.desc: "审查结束时没有完整提交的配对。未建立婚姻或订婚。临时状态已清理，一次性存档锁仍然保留。"
 breedimp_p3_proto_matchmaking.1141.a: "结束原型。"

