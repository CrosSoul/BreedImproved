 breedimp_p3_proto_matchmaking.1143.b.tt: "丢弃全部 16 组临时记录，不建立任何关系。"

 breedimp_p3_proto_matchmaking.1144.t: "原型批次已完成"
 breedimp_p3_proto_matchmaking.1144.desc: "获准的批次执行流程已经完成。\n接受的配对：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_accepted_pair_count').GetValue|0]\n已进入的关系操作：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_executed_pair_count').GetValue|0]\n婚姻：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_executed_marriage_count').GetValue|0]\n订婚：[ROOT.Char.MakeScope.Var('breedimp_p3_proto_executed_betrothal_count').GetValue|0]\n\n已处理配对："
