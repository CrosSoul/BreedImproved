 breedimp_p3_proto_matchmaking.1100.a: "Confirm the entire plan."
 breedimp_p3_proto_matchmaking.1100.a.tt: "Preflight every pair first. Execute all relationships only if the complete plan remains valid."
 breedimp_p3_proto_matchmaking.1100.b: "Cancel without relationships."
 breedimp_p3_proto_matchmaking.1100.b.tt: "Discard the plan and clean the temporary workflow. The permanent one-run lock remains consumed."

 breedimp_p3_proto_matchmaking.1140.t: "No Prototype Subjects"
 breedimp_p3_proto_matchmaking.1140.desc: "No eligible Dynasty member was available as a matchmaking subject. The temporary workflow has been cleaned; this save's prototype run remains consumed."
 breedimp_p3_proto_matchmaking.1140.a: "End the prototype."

 breedimp_p3_proto_matchmaking.1141.t: "No Accepted Pair"
 breedimp_p3_proto_matchmaking.1141.desc: "The review ended without a committed pair. No marriage or betrothal was created. Temporary state has been cleaned, while the one-run save lock remains."
 breedimp_p3_proto_matchmaking.1141.a: "End the prototype."

 breedimp_p3_proto_matchmaking.1142.t: "Prototype Preflight Failed"
