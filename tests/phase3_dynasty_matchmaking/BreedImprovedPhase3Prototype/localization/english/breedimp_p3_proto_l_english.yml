l_english:
 breedimp_p3_proto_manage_matchmaking_decision: "Manage Dynasty Matchmaking (Prototype)"
 breedimp_p3_proto_manage_matchmaking_decision_tooltip: "Open the isolated Phase 3 matchmaking prototype."
 breedimp_p3_proto_manage_matchmaking_decision_desc: "Test a Dynast-only workflow for planning marriages and betrothals within your current Dynasty. This prototype permits only one activated workflow per save."
 breedimp_p3_proto_manage_matchmaking_decision_confirm: "Open Prototype"
 breedimp_p3_proto_manage_matchmaking_decision_invalid_tt: "You must be a living player Dynast, and this save must not have consumed its prototype workflow."

 breedimp_p3_proto_matchmaking.1000.t: "Phase 3 Prototype Activation"
 breedimp_p3_proto_matchmaking.1000.desc: "Activating the prototype grants a temporary Dynast override for this workflow only. It also permanently consumes this save's single prototype run. Cancelling this page consumes nothing."
 breedimp_p3_proto_matchmaking.1000.a: "Activate the isolated workflow."
 breedimp_p3_proto_matchmaking.1000.a.tt: "Consume this save's single run, record your current Dynasty, and begin staged candidate review."
 breedimp_p3_proto_matchmaking.1000.b: "Cancel before activation."
 breedimp_p3_proto_matchmaking.1000.b.tt: "Close the entry confirmation without creating workflow state or consuming the save-wide lock."

 breedimp_p3_proto_matchmaking.1020.t: "Prototype Match Review"
 breedimp_p3_proto_matchmaking.1020.desc: "Subject: [breedimp_p3_proto_current_subject.GetShortUIName], age [breedimp_p3_proto_current_subject.GetAge]\nProposed partner: [breedimp_p3_proto_current_partner.GetShortUIName], age [breedimp_p3_proto_current_partner.GetAge]"
 breedimp_p3_proto_matchmaking.1020.type.marriage: "Planned relationship: marriage."
 breedimp_p3_proto_matchmaking.1020.type.betrothal: "Planned relationship: betrothal, because at least one participant is a minor."
 breedimp_p3_proto_matchmaking.1020.diagnostics: "Prototype diagnostics — Dynasty members: [ROOT.Char.MakeScope.Var('breedimp_p3_proto_dynasty_member_count').GetValue|0]; eligible subjects: [ROOT.Char.MakeScope.Var('breedimp_p3_proto_subject_count').GetValue|0]; current legality checks: [ROOT.Char.MakeScope.Var('breedimp_p3_proto_current_legality_check_count').GetValue|0]; legal sorting candidates: [ROOT.Char.MakeScope.Var('breedimp_p3_proto_current_sort_candidate_count').GetValue|0]; partners in this staged pool: [ROOT.Char.MakeScope.Var('breedimp_p3_proto_current_partner_count').GetValue|0]; accepted pairs: [ROOT.Char.MakeScope.Var('breedimp_p3_proto_accepted_pair_count').GetValue|0]/16."
 breedimp_p3_proto_matchmaking.1020.a: "Accept as an ordinary union."
 breedimp_p3_proto_matchmaking.1020.a.tt: "Store this pair with ordinary direction. No marriage or betrothal is created before final confirmation."
 breedimp_p3_proto_matchmaking.1020.b: "Accept as a matrilineal union."
 breedimp_p3_proto_matchmaking.1020.b.tt: "Store this pair with matrilineal direction. No marriage or betrothal is created before final confirmation."
 breedimp_p3_proto_matchmaking.1020.c: "Show another partner for this subject."
 breedimp_p3_proto_matchmaking.1020.c.tt: "Reject only the displayed partner for this subject and select the next staged candidate."
 breedimp_p3_proto_matchmaking.1020.d: "Skip this pair and subject."
 breedimp_p3_proto_matchmaking.1020.d.tt: "Accept neither participant as a pair and continue to another subject."
 breedimp_p3_proto_matchmaking.1020.e: "Defer this subject."
 breedimp_p3_proto_matchmaking.1020.e.tt: "Move this subject behind all not-yet-reviewed subjects for one later review."
 breedimp_p3_proto_matchmaking.1020.f: "Finish review early."
 breedimp_p3_proto_matchmaking.1020.f.tt: "Keep only the accepted pairs and proceed to final confirmation. If none were accepted, end without relationships."
 breedimp_p3_proto_matchmaking.1020.g: "Cancel the entire workflow."
 breedimp_p3_proto_matchmaking.1020.g.tt: "Discard all temporary plans and grant no further workflow access in this save. No relationship is created."

 breedimp_p3_proto_matchmaking.1100.t: "Confirm Prototype Matchmaking Plan"
 breedimp_p3_proto_matchmaking.1100.desc: "Review the complete temporary plan. Final confirmation first preflights every committed slot and every cross-slot reservation. If any pair fails, the whole batch stops before any relationship is created."
 breedimp_p3_proto_matchmaking.1100.diagnostics: "Accepted pairs: [ROOT.Char.MakeScope.Var('breedimp_p3_proto_accepted_pair_count').GetValue|0]/16. Each line records subject, partner, relationship type, direction, and placeholder state."
