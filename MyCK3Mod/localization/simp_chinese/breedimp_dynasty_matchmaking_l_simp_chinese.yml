 breedimp_dynasty_matchmaking.2100.slot_32: "32. [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_32_subject').Char.GetShortUIName] + [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_32_partner').Char.GetShortUIName]——[ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_32_relationship_type').GetFlagName]，[ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_32_direction').GetFlagName]，[ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_32_placeholder').GetFlagName]。"
 breedimp_dynasty_matchmaking.2100.a: "确认名册上的全部婚配。"
 breedimp_dynasty_matchmaking.2100.a.tt: "先检查整份计划；仅当所有配对仍然有效时，才按顺序执行。"
 breedimp_dynasty_matchmaking.2100.b: "取消并合上名册。"
 breedimp_dynasty_matchmaking.2100.b.tt: "丢弃全部临时计划，不建立任何婚姻或订婚。"

 breedimp_dynasty_matchmaking.2140.t: "名册已满"
 breedimp_dynasty_matchmaking.2140.desc: "本轮已接受 32 组配对，达到单次审查的安全上限。任何槽位都不会被覆盖。请先确认这本名册；其余候选人可以留待下一轮审查。"
 breedimp_dynasty_matchmaking.2140.a: "把这些名字送去最终确认。"
 breedimp_dynasty_matchmaking.2140.a.tt: "保留 32 组已接受配对并打开最终确认。"
 breedimp_dynasty_matchmaking.2140.b: "丢弃这本名册。"
 breedimp_dynasty_matchmaking.2140.b.tt: "取消流程，不建立任何关系。"

 breedimp_dynasty_matchmaking.2150.t: "计划已不再成立"
 breedimp_dynasty_matchmaking.2150.desc: "整份名册在第 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_failure_slot').GetValue|0] 槽的最终检查中失败。本计划没有建立任何婚姻或订婚。"
 breedimp_dynasty_matchmaking.2150.a: "合上无效的名册。"

 breedimp_dynasty_matchmaking.2160.t: "婚配已经安排妥当"
 breedimp_dynasty_matchmaking.2160.desc: "名册已经执行：共完成 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_pair_count').GetValue|0] 桩婚配，其中有 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_marriage_count').GetValue|0] 桩婚姻和 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_betrothal_count').GetValue|0] 桩订婚。"
 breedimp_dynasty_matchmaking.2160.a: "合上名册。"

 breedimp_dynasty_matchmaking.2170.t: "名册只执行了一部分"
 breedimp_dynasty_matchmaking.2170.desc: "#warning 执行在第 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_failure_slot').GetValue|0] 槽停止，因为预期的关系没有出现。此前完成的 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_pair_count').GetValue|0] 桩婚配仍然有效；没有尝试回滚，也没有执行之后的槽位。#!"
 breedimp_dynasty_matchmaking.2170.a: "记下结果，合上名册。"

 breedimp_dynasty_matchmaking.2180.t: "空空如也的名册"
 breedimp_dynasty_matchmaking.2180.desc: "没有符合条件的宗族成员可以作为待婚者。没有发生任何改变，日后仍可重新开始审查。"
 breedimp_dynasty_matchmaking.2180.a: "收起名册。"

 breedimp_dynasty_matchmaking.2181.t: "未选中任何婚配"
 breedimp_dynasty_matchmaking.2181.desc: "审查结束时没有接受任何配对。没有建立婚姻或订婚，日后仍可重新开始审查。"
 breedimp_dynasty_matchmaking.2181.a: "收起名册。"

 breedimp_dynasty_matchmaking.2190.t: "旧名册已经合上"
 breedimp_dynasty_matchmaking.2190.desc: "中断审查留下的临时计划已经丢弃。本次恢复没有建立任何关系，现在可以重新开始审查。"
 breedimp_dynasty_matchmaking.2190.a: "很好。"
 breedimp_dynasty_matchmaking.closed: "这本名册已经失效。"

