l_simp_chinese:
 breedimp_manage_dynasty_matchmaking_decision: "管理宗族婚配"
 breedimp_manage_dynasty_matchmaking_decision_tooltip: "为宗族中符合条件的成员逐一审阅婚姻与订婚提议。"
 breedimp_manage_dynasty_matchmaking_decision_desc: "身为宗族族长，你可以为当前宗族整理一册婚配名录。每项提议都由你亲自裁定；在最终确认之前，不会缔结任何关系。"
 breedimp_manage_dynasty_matchmaking_decision_confirm: "翻开婚配名册"
 breedimp_manage_dynasty_matchmaking_decision_invalid_tt: "你必须是仍然在世的玩家宗族族长，且当前不能已有另一场 Breed Improved 婚配审查。"

 breedimp_recover_dynasty_matchmaking_decision: "结束中断的婚配审查"
 breedimp_recover_dynasty_matchmaking_decision_tooltip: "丢弃中断审查留下的临时计划。"
 breedimp_recover_dynasty_matchmaking_decision_desc: "婚配名册在议事结束前便被搁下。把旧账收拾妥当，才能重新开始审查。"
 breedimp_recover_dynasty_matchmaking_decision_confirm: "清理旧名册"

 breedimp_dynasty_matchmaking.2000.t: "宗族的未来"
 breedimp_dynasty_matchmaking.2000.desc: "在本次审查期间，你可以宗族族长的身份，为当前宗族内符合条件且由 AI 控制的成员安排婚配。原版婚姻合法性仍然适用，这项权限也会随本次流程结束。\n\n名册最多可容纳 32 组已接受配对。在最终确认之前，不会建立任何婚姻或订婚。"
 breedimp_dynasty_matchmaking.2000.a: "开始审查。"
 breedimp_dynasty_matchmaking.2000.a.tt: "为当前宗族开启一次临时婚配流程。"
 breedimp_dynasty_matchmaking.2000.b: "今日作罢。"
 breedimp_dynasty_matchmaking.2000.b.tt: "关闭此页，不创建任何流程状态。"

 breedimp_dynasty_matchmaking.2020.t: "一桩婚配提议"
 breedimp_dynasty_matchmaking.2020.desc: "待婚者：[breedimp_dynasty_matchmaking_current_subject.GetShortUIName]，年龄 [breedimp_dynasty_matchmaking_current_subject.GetAge]，生育力 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_displayed_subject_fertility_percent').GetValue|0]%\n提议配偶：[breedimp_dynasty_matchmaking_current_partner.GetShortUIName]，年龄 [breedimp_dynasty_matchmaking_current_partner.GetAge]，生育力 [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_displayed_partner_fertility_percent').GetValue|0]%"
 breedimp_dynasty_matchmaking.2020.type.marriage: "双方均已成年；最终确认后将缔结婚姻。"
 breedimp_dynasty_matchmaking.2020.type.betrothal: "至少一方尚未成年；最终确认后将缔结婚约。"
 breedimp_dynasty_matchmaking.2020.placeholder: "#warning 提议配偶当前没有正生育力，仅作为有生育力且曾经结婚的成年人的后备选择。#!"
 breedimp_dynasty_matchmaking.2020.subject_positive: "待婚者拥有一个或多个已知的正面先天特质。"
 breedimp_dynasty_matchmaking.2020.subject_negative: "#warning 待婚者拥有一个或多个已知的负面先天特质。#!"
 breedimp_dynasty_matchmaking.2020.positive: "提议配偶拥有一个或多个已知的正面先天特质。"
 breedimp_dynasty_matchmaking.2020.negative: "#warning 提议配偶拥有一个或多个已知的负面先天特质。#!"
 breedimp_dynasty_matchmaking.2020.kin.close: "#warning CK3 将两人视为近亲，不过依其信仰，这桩婚配目前仍属合法。#!"
 breedimp_dynasty_matchmaking.2020.kin.extended: "两人属于远亲关系。"
 breedimp_dynasty_matchmaking.2020.kin.distant: "未检测到近亲或远亲类别；这并不宣称两人毫无血缘。"
 breedimp_dynasty_matchmaking.2020.status: "已接受配对：[ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_accepted_pair_count').GetValue|0]/32。"
 breedimp_dynasty_matchmaking.2020.a: "接受普通婚配。"
 breedimp_dynasty_matchmaking.2020.a.tt: "保留双方，并把这组普通婚姻或订婚写入临时计划。"
 breedimp_dynasty_matchmaking.2020.b: "接受母系婚配。"
 breedimp_dynasty_matchmaking.2020.b.tt: "保留双方，并把这组母系婚姻或订婚写入临时计划。"
 breedimp_dynasty_matchmaking.2020.c: "再换一位配偶。"
 breedimp_dynasty_matchmaking.2020.c.tt: "在本次审查中否决当前这组精确配对，并为同一名待婚者展示另一位合格配偶。"
 breedimp_dynasty_matchmaking.2020.d: "跳过此人。"
 breedimp_dynasty_matchmaking.2020.d.tt: "本轮不为这名待婚者制定婚配计划。"
 breedimp_dynasty_matchmaking.2020.e: "先把这个名字放到一旁。"
 breedimp_dynasty_matchmaking.2020.e.tt: "暂缓此人，待所有尚未审阅的待婚者处理完毕后再行考虑。"
 breedimp_dynasty_matchmaking.2020.f: "这本名册已经够长了。"
 breedimp_dynasty_matchmaking.2020.f.tt: "保留已经接受的配对并进入最终确认；若尚未接受任何配对，则不作改变并结束。"
 breedimp_dynasty_matchmaking.2020.g: "合上名册。"
 breedimp_dynasty_matchmaking.2020.g.tt: "取消整场审查，丢弃所有临时计划，不建立任何关系。"

 breedimp_dynasty_matchmaking.2100.t: "确认婚配计划"
 breedimp_dynasty_matchmaking.2100.desc: "名册已经备妥。第一桩婚配建立之前，会再次检查列出的全部配对；若最终检查失败，整份计划都不会执行。"
 breedimp_dynasty_matchmaking.2100.status: "已接受配对：[ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_accepted_pair_count').GetValue|0]/32。"
