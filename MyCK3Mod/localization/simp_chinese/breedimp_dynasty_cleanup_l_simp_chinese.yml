l_simp_chinese:
 breedimp_protect_from_bulk_cleanup_interaction: "排除于批量清理"
 breedimp_protect_from_bulk_cleanup_interaction_desc: "$dynasty_interaction_header$在“Breed Improved”的所有批量清理模式中，将[recipient.GetShortUINameNoTooltip]排除为直接候选目标。若其是其他已选角色的后代，仍可能随该角色迁移；此保护也不会阻止单独使用“逐出宗族”互动。"
 breedimp_protect_from_bulk_cleanup_interaction_prompt: "将该角色排除为批量清理的直接候选目标？若其是其他已选角色的后代，仍可能随该角色迁移；仍可单独使用“逐出宗族”互动。"
 breedimp_remove_bulk_cleanup_protection_interaction: "移除批量清理保护"
 breedimp_remove_bulk_cleanup_protection_interaction_desc: "$dynasty_interaction_header$当[recipient.GetShortUINameNoTooltip]满足所选模式时，允许其出现在“Breed Improved”批量清理中。"
 breedimp_remove_bulk_cleanup_protection_interaction_prompt: "移除该角色的批量清理保护？此操作不会逐出该角色。"
 breedimp_bulk_cleanup_protection_invalid_tt: "所选角色必须仍然在世、并非出身卑微、由AI控制并属于你的宗族；你也必须仍是在世的玩家宗族族长。"

 breedimp_manage_dynasty_cleanup_decision: "管理宗族清理"
 breedimp_manage_dynasty_cleanup_decision_tooltip: "由玩家主动审查符合条件的宗族成员。"
 breedimp_manage_dynasty_cleanup_decision_desc: "选择一种候选模式，然后逐一审查每名符合条件的角色。只有确认此决议后才会开始扫描。选择候选人不会立即改变任何人的宗族；执行前还需进行一次单独的最终确认。受保护角色、玩家角色、家主、宗族族长、死亡角色、出身卑微者、不属于你宗族的角色以及你的祖先会被排除为直接目标。已选目标的后代仍会按审查说明随之迁移。"
 breedimp_manage_dynasty_cleanup_decision_confirm: "审查候选人"
 breedimp_manage_dynasty_cleanup_decision_next: "选择清理模式"
 breedimp_manage_dynasty_cleanup_decision_invalid_tt: "你必须是在世、由玩家控制的宗族族长。"
 breedimp_bulk_cleanup_bloodline_mode: "血缘清理"
 breedimp_bulk_cleanup_bloodline_mode_desc: "查找在世的宗族成员：私生子、合法化私生子，或明确存在的合法父母双方都不属于你的宗族。只有一名外宗族父母或父母缺失均不足以入选。不会检查隐藏的生父母秘密。强制排除规则和个人直接候选保护均会生效。扫描只会建立审查名单；最终确认前不会逐出任何人。确认目标后，其完整后代分支会随其迁移。"
 breedimp_bulk_cleanup_trait_mode: "负面先天特质清理"
 breedimp_bulk_cleanup_trait_mode_desc: "查找至少拥有一项“Breed Improved”固定且已核实的负面先天特质的在世宗族成员。疾病、受伤、压力、教育、生活方式、将领、性格、事件和年龄特质均不包含在内。正面先天特质会显示警告，但不会取消候选资格。强制排除规则和个人直接候选保护均会生效。扫描只会建立审查名单；最终确认前不会逐出任何人。确认目标后，其完整后代分支会随其迁移。"

 breedimp_dynasty_cleanup.1001.t: "宗族清理候选人"
 breedimp_dynasty_cleanup.1001.desc: "候选人：[breedimp_bulk_cleanup_candidate.GetShortUIName]\n年龄：[breedimp_bulk_cleanup_candidate.GetAge]\n关系：[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('breedimp_bulk_cleanup_candidate'))]\n\n请审查下方的候选原因与影响。选择该候选人只会将其加入最终确认名单，尚不会改变其宗族。\n\n@warning_icon! #X 最终确认后，该候选人及其所有后代将加入同一个新生成的宗族。父母与兄弟姐妹保持不变。此操作不会直接改变头衔、宣称、婚姻、宫廷状态或政体。CK3可能会重新计算继承顺序与玩家继承人。#!"
 breedimp_dynasty_cleanup.1001.mode.bloodline: "$BULLET_WITH_TAB$模式：血缘清理"
 breedimp_dynasty_cleanup.1001.mode.traits: "$BULLET_WITH_TAB$模式：负面先天特质清理"
 breedimp_dynasty_cleanup.1001.status.landed: "$BULLET_WITH_TAB$状态：有领地——[breedimp_bulk_cleanup_candidate.GetPrimaryTitle.GetName]"
