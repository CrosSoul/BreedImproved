 breedimp_dynasty_cleanup.1001.a: "“滚出我的家族！”"
 breedimp_dynasty_cleanup.1001.a.tt: "将此人记入逐出名单。"
 breedimp_dynasty_cleanup.1001.b: "“算了，放你一马。”"
 breedimp_dynasty_cleanup.1001.b.tt: "放过此人，继续审查下一位。"
 breedimp_dynasty_cleanup.1001.c: "“先到这里吧。”"
 breedimp_dynasty_cleanup.1001.c.tt: "保留当前名单，直接进入最终确认。"
 breedimp_dynasty_cleanup.1001.d: "“不用看了，全部驱逐出去。”"
 breedimp_dynasty_cleanup.1001.d.tt: "将当前及尚未审查的候选人全部记入名单，然后进入最终确认。此前已经放过的人不受影响。"

 breedimp_dynasty_cleanup.1002.t: "确认宗族清理"
 breedimp_dynasty_cleanup.1002.desc.selected: "管家合上册子。\n\n‘家主，名单已经整理妥当。您只需点头，您伟大的宗族将重归纯净。’"
 breedimp_dynasty_cleanup.1002.desc.empty: "没有选中任何候选人。关闭此次审查后，所有角色的宗族归属都不会改变。"
 breedimp_dynasty_cleanup.1002.a: "“就这么做！”"
 breedimp_dynasty_cleanup.1002.b: "“我再考虑考虑。”"
 breedimp_dynasty_cleanup.1002.confirm.tt: "按名单逐出这些角色及其后代。"
 breedimp_dynasty_cleanup.1002.cancel.tt: "结束清理，不作任何改变。"
