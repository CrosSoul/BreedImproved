 breedimp_dynasty_cleanup.1002.t: "确认宗族清理"
 breedimp_dynasty_cleanup.1002.desc.selected: "你已经选择了一名或多名候选人。确认后，系统会立即重新验证每个目标，将仍然有效的已选祖先之下的已选后代合并，并对剩余的每个分支根角色应用现有“逐出宗族”后果。\n\n@warning_icon! #X 每个有效分支根角色及其所有后代都将加入一个新生成的宗族。确认后无法回滚。#!"
 breedimp_dynasty_cleanup.1002.desc.empty: "没有选中任何候选人。关闭此次审查后，所有角色的宗族归属都不会改变。"
 breedimp_dynasty_cleanup.1002.a: "确认逐出所选目标"
 breedimp_dynasty_cleanup.1002.b: "取消——不作更改"
 breedimp_dynasty_cleanup.1002.confirm.tt: "每个所选角色都会在执行前立即重新验证。已经失效的目标将被跳过。"
