 breedimp_dynasty_matchmaking.2100.a: "Confirm every listed union."
 breedimp_dynasty_matchmaking.2100.a.tt: "Preflight the complete plan, then execute it sequentially only if every pair remains valid."
 breedimp_dynasty_matchmaking.2100.b: "Cancel and close the ledger."
 breedimp_dynasty_matchmaking.2100.b.tt: "Discard all temporary plans and create no marriage or betrothal."

 breedimp_dynasty_matchmaking.2140.t: "The Ledger Is Full"
 breedimp_dynasty_matchmaking.2140.desc: "Thirty-two pairs have been accepted, the safe limit for one review. No slot will be overwritten. Confirm this ledger first; any remaining candidates may be considered in a later review."
 breedimp_dynasty_matchmaking.2140.a: "Take these names to final confirmation."
 breedimp_dynasty_matchmaking.2140.a.tt: "Keep the 32 accepted pairs and open the final confirmation."
 breedimp_dynasty_matchmaking.2140.b: "Discard this ledger."
 breedimp_dynasty_matchmaking.2140.b.tt: "Cancel the workflow and create no relationships."

 breedimp_dynasty_matchmaking.2150.t: "The Plan No Longer Holds"
 breedimp_dynasty_matchmaking.2150.desc: "The complete ledger failed its final preflight at slot [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_failure_slot').GetValue|0]. No marriage or betrothal from this plan was created."
 breedimp_dynasty_matchmaking.2150.a: "Close the invalid ledger."

 breedimp_dynasty_matchmaking.2160.t: "The Unions Are Arranged"
 breedimp_dynasty_matchmaking.2160.desc: "The ledger has been carried out: [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_pair_count').GetValue|0] unions in total, including [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_marriage_count').GetValue|0] marriages and [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_betrothal_count').GetValue|0] betrothals."
 breedimp_dynasty_matchmaking.2160.a: "Close the ledger."

 breedimp_dynasty_matchmaking.2170.t: "The Ledger Was Only Partly Fulfilled"
 breedimp_dynasty_matchmaking.2170.desc: "#warning Execution stopped at slot [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_failure_slot').GetValue|0] because the expected relationship was not observed. [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_executed_pair_count').GetValue|0] earlier unions remain in force; no rollback was attempted and no later slot was executed.#!"
 breedimp_dynasty_matchmaking.2170.a: "Record what was done and close the ledger."

 breedimp_dynasty_matchmaking.2180.t: "An Empty Ledger"
 breedimp_dynasty_matchmaking.2180.desc: "No eligible Dynasty member could be offered as a matchmaking subject. Nothing was changed, and another review may be opened later."
 breedimp_dynasty_matchmaking.2180.a: "Put the ledger away."

 breedimp_dynasty_matchmaking.2181.t: "No Union Chosen"
 breedimp_dynasty_matchmaking.2181.desc: "The review ended without an accepted pair. No marriage or betrothal was created, and another review may be opened later."
 breedimp_dynasty_matchmaking.2181.a: "Put the ledger away."

 breedimp_dynasty_matchmaking.2190.t: "The Old Ledger Is Closed"
 breedimp_dynasty_matchmaking.2190.desc: "Temporary plans from the interrupted review have been discarded. No relationship was created by this recovery, and a fresh review may now begin."
 breedimp_dynasty_matchmaking.2190.a: "Good."
 breedimp_dynasty_matchmaking.closed: "This ledger is no longer active."

