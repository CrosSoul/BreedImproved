l_english:
 breedimp_manage_dynasty_matchmaking_decision: "Manage Dynasty Matchmaking"
 breedimp_manage_dynasty_matchmaking_decision_tooltip: "Review marriage and betrothal proposals for eligible members of your Dynasty."
 breedimp_manage_dynasty_matchmaking_decision_desc: "As Dynast, you may prepare a private ledger of suitable unions within your Dynasty. You will review each proposal yourself, and nothing is arranged until you confirm the completed plan."
 breedimp_manage_dynasty_matchmaking_decision_confirm: "Open the Matchmaking Ledger"
 breedimp_manage_dynasty_matchmaking_decision_invalid_tt: "You must be the living player Dynast, and no other Breed Improved matchmaking review may be active."

 breedimp_recover_dynasty_matchmaking_decision: "Close an Interrupted Matchmaking Review"
 breedimp_recover_dynasty_matchmaking_decision_tooltip: "Discard temporary plans left by an interrupted review."
 breedimp_recover_dynasty_matchmaking_decision_desc: "The matchmaking ledger was put aside before its business was concluded. Close it properly so a fresh review may begin."
 breedimp_recover_dynasty_matchmaking_decision_confirm: "Clear the Old Ledger"

 breedimp_dynasty_matchmaking.2000.t: "A Dynasty’s Future"
 breedimp_dynasty_matchmaking.2000.desc: "Your position as Dynast permits you to arrange unions for eligible AI-controlled members throughout your current Dynasty during this review. Vanilla marriage legality still applies, and the authority ends with this workflow.\n\nThe ledger can hold at most 32 accepted pairs. No marriage or betrothal is created until final confirmation."
 breedimp_dynasty_matchmaking.2000.a: "Begin the review."
 breedimp_dynasty_matchmaking.2000.a.tt: "Open a temporary matchmaking workflow for your current Dynasty."
 breedimp_dynasty_matchmaking.2000.b: "Not today."
 breedimp_dynasty_matchmaking.2000.b.tt: "Close this page without creating any workflow state."

 breedimp_dynasty_matchmaking.2020.t: "A Proposed Union"
 breedimp_dynasty_matchmaking.2020.desc: "Subject: [breedimp_dynasty_matchmaking_current_subject.GetShortUIName], age [breedimp_dynasty_matchmaking_current_subject.GetAge], fertility [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_displayed_subject_fertility_percent').GetValue|0]%\nProposed partner: [breedimp_dynasty_matchmaking_current_partner.GetShortUIName], age [breedimp_dynasty_matchmaking_current_partner.GetAge], fertility [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_displayed_partner_fertility_percent').GetValue|0]%"
 breedimp_dynasty_matchmaking.2020.type.marriage: "Both are adults; confirmation would arrange a marriage."
 breedimp_dynasty_matchmaking.2020.type.betrothal: "At least one is a minor; confirmation would arrange a betrothal."
 breedimp_dynasty_matchmaking.2020.placeholder: "#warning The proposed partner has no positive evaluated fertility and is offered only as a fallback for a fertile, previously married adult.#!"
 breedimp_dynasty_matchmaking.2020.subject_positive: "The subject carries one or more known favorable congenital traits."
 breedimp_dynasty_matchmaking.2020.subject_negative: "#warning The subject carries one or more known unfavorable congenital traits.#!"
 breedimp_dynasty_matchmaking.2020.positive: "The proposed partner carries one or more known favorable congenital traits."
 breedimp_dynasty_matchmaking.2020.negative: "#warning The proposed partner carries one or more known unfavorable congenital traits.#!"
 breedimp_dynasty_matchmaking.2020.kin.close: "#warning CK3 considers these characters close family, although the proposed union remains legal under their faith.#!"
 breedimp_dynasty_matchmaking.2020.kin.extended: "These characters belong to an extended family category."
 breedimp_dynasty_matchmaking.2020.kin.distant: "No close or extended family category was detected; this is not a claim of zero relation."
 breedimp_dynasty_matchmaking.2020.status: "Accepted pairs: [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_accepted_pair_count').GetValue|0]/32."
 breedimp_dynasty_matchmaking.2020.a: "Accept an ordinary union."
 breedimp_dynasty_matchmaking.2020.a.tt: "Reserve both characters and add this ordinary marriage or betrothal to the temporary plan."
 breedimp_dynasty_matchmaking.2020.b: "Accept a matrilineal union."
 breedimp_dynasty_matchmaking.2020.b.tt: "Reserve both characters and add this matrilineal marriage or betrothal to the temporary plan."
 breedimp_dynasty_matchmaking.2020.c: "Show me another partner."
 breedimp_dynasty_matchmaking.2020.c.tt: "Reject this exact pair for the current review and show another eligible partner for the same subject."
 breedimp_dynasty_matchmaking.2020.d: "Skip this subject."
 breedimp_dynasty_matchmaking.2020.d.tt: "Make no plan for this subject during the current review."
 breedimp_dynasty_matchmaking.2020.e: "Set this name aside."
 breedimp_dynasty_matchmaking.2020.e.tt: "Defer this subject until all not-yet-reviewed subjects have been considered."
 breedimp_dynasty_matchmaking.2020.f: "The ledger is long enough."
 breedimp_dynasty_matchmaking.2020.f.tt: "Keep accepted pairs and proceed to final confirmation. If none were accepted, end without changes."
 breedimp_dynasty_matchmaking.2020.g: "Close the ledger."
 breedimp_dynasty_matchmaking.2020.g.tt: "Cancel the entire review, discard every temporary plan, and create no relationships."

 breedimp_dynasty_matchmaking.2100.t: "Confirm the Matchmaking Plan"
 breedimp_dynasty_matchmaking.2100.desc: "The ledger is ready. Every listed pair will be checked again before the first union is created. If that preflight fails, none will be executed."
 breedimp_dynasty_matchmaking.2100.status: "Accepted pairs: [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_accepted_pair_count').GetValue|0]/32."
 breedimp_dynasty_matchmaking.2100.slot_01: "1. [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_1_subject').Char.GetShortUIName] + [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_1_partner').Char.GetShortUIName] — [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_1_relationship_type').GetFlagName], [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_1_direction').GetFlagName], [ROOT.Char.MakeScope.Var('breedimp_dynasty_matchmaking_slot_1_placeholder').GetFlagName]."
