 breedimp_dynasty_cleanup.1002.t: "Confirm Dynasty Cleanup"
 breedimp_dynasty_cleanup.1002.desc.selected: "You selected one or more candidates. Confirming will immediately revalidate each selection, collapse selected descendants under a still-valid selected ancestor, and apply the existing Exile from Dynasty consequences to each remaining branch root.\n\n@warning_icon! #X Each valid branch root and all descendants will enter a generated replacement Dynasty. There is no rollback after confirmation.#!"
 breedimp_dynasty_cleanup.1002.desc.empty: "No candidates were selected. Close this review to leave every Dynasty membership unchanged."
 breedimp_dynasty_cleanup.1002.a: "Confirm Selected Exiles"
 breedimp_dynasty_cleanup.1002.b: "Cancel — No Changes"
 breedimp_dynasty_cleanup.1002.confirm.tt: "Every selected character is revalidated immediately before execution. Invalid selections are skipped."
