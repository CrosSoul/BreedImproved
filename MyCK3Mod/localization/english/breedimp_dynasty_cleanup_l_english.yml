l_english:
 breedimp_protect_from_bulk_cleanup_interaction: "Protect from Bulk Cleanup"
 breedimp_protect_from_bulk_cleanup_interaction_desc: "$dynasty_interaction_header$Exclude [recipient.GetShortUINameNoTooltip] as a direct candidate in every Breed Improved bulk cleanup mode. This does not protect them from moving as a descendant of another selected character and does not block the individual Exile from Dynasty interaction."
 breedimp_protect_from_bulk_cleanup_interaction_prompt: "Exclude this character as a direct bulk-cleanup candidate? They may still move as a descendant of another selected character, and the individual Exile from Dynasty interaction will remain available."
 breedimp_remove_bulk_cleanup_protection_interaction: "Remove Bulk Cleanup Protection"
 breedimp_remove_bulk_cleanup_protection_interaction_desc: "$dynasty_interaction_header$Allow [recipient.GetShortUINameNoTooltip] to appear in Breed Improved bulk cleanup when they satisfy the selected mode."
 breedimp_remove_bulk_cleanup_protection_interaction_prompt: "Remove this character's bulk cleanup protection? This does not exile the character."
 breedimp_bulk_cleanup_protection_invalid_tt: "The selected character must be a living, highborn, AI-controlled member of your Dynasty, and you must remain the living player Dynast."

 breedimp_manage_dynasty_cleanup_decision: "Manage Dynasty Cleanup"
 breedimp_manage_dynasty_cleanup_decision_tooltip: "Start a player-controlled review of eligible Dynasty members."
 breedimp_manage_dynasty_cleanup_decision_desc: "Choose one candidate mode, then review every eligible character individually. Scanning begins only after you confirm this Decision. Selecting candidates does not change anyone's Dynasty until a separate final confirmation. Protected characters, players, House Heads, the Dynast, dead characters, lowborn characters, characters outside your Dynasty, and your own ancestors are excluded as direct targets. Descendants of a selected target still move as disclosed during review."
 breedimp_manage_dynasty_cleanup_decision_confirm: "Review Candidates"
 breedimp_manage_dynasty_cleanup_decision_next: "Choose Cleanup Mode"
 breedimp_manage_dynasty_cleanup_decision_invalid_tt: "You must be the living player-controlled Dynast."
 breedimp_bulk_cleanup_bloodline_mode: "Bloodline Cleanup"
 breedimp_bulk_cleanup_bloodline_mode_desc: "Find living Dynasty members who are Bastards, Legitimized Bastards, or have two explicitly existing legal parents who are both outside your Dynasty. One outside parent or a missing parent is not enough. Hidden biological-parent secrets are not checked. Mandatory exclusions and individual direct-candidate protection apply. Scanning only creates a review list; no one is exiled before final confirmation. A confirmed target's complete descendant branch moves with them."
 breedimp_bulk_cleanup_trait_mode: "Negative Congenital Trait Cleanup"
 breedimp_bulk_cleanup_trait_mode_desc: "Find living Dynasty members with at least one trait from Breed Improved's fixed, verified negative congenital preset. Diseases, injuries, stress, education, lifestyle, commander, personality, event, and age traits are excluded. Positive congenital traits warn you but do not cancel candidacy. Mandatory exclusions and individual direct-candidate protection apply. Scanning only creates a review list; no one is exiled before final confirmation. A confirmed target's complete descendant branch moves with them."

 breedimp_dynasty_cleanup.1001.t: "Dynasty Cleanup Candidate"
 breedimp_dynasty_cleanup.1001.desc: "Candidate: [breedimp_bulk_cleanup_candidate.GetShortUIName]\nAge: [breedimp_bulk_cleanup_candidate.GetAge]\nRelation: [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('breedimp_bulk_cleanup_candidate'))]\n\nReview the reason and impact below. Selecting this candidate only adds them to the final confirmation; it does not change their Dynasty yet.\n\n@warning_icon! #X If finally confirmed, this candidate and all descendants will enter one generated replacement Dynasty. Parents and siblings remain unchanged. Titles, claims, marriages, court status, and government are not directly changed. CK3 may recalculate succession and the player heir.#!"
 breedimp_dynasty_cleanup.1001.mode.bloodline: "$BULLET_WITH_TAB$Mode: Bloodline Cleanup"
 breedimp_dynasty_cleanup.1001.mode.traits: "$BULLET_WITH_TAB$Mode: Negative Congenital Trait Cleanup"
 breedimp_dynasty_cleanup.1001.status.landed: "$BULLET_WITH_TAB$Status: Landed — [breedimp_bulk_cleanup_candidate.GetPrimaryTitle.GetName]"
 breedimp_dynasty_cleanup.1001.status.unlanded: "$BULLET_WITH_TAB$Status: Unlanded"
 breedimp_dynasty_cleanup.1001.status.has_children: "$BULLET_WITH_TAB$Children: At least one legal child is recorded, including deceased children; the complete descendant branch will move."
 breedimp_dynasty_cleanup.1001.status.no_children: "$BULLET_WITH_TAB$Children: No legal child is recorded."
 breedimp_dynasty_cleanup.1001.reason.bastard: "$BULLET_WITH_TAB$Candidate reason: [GetTrait('bastard').GetName( GetNullCharacter )]"
