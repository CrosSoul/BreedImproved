 breedimp_dynasty_cleanup.1001.warning.positive_trait: "@warning_icon! #X This candidate also bears a congenital gift worth preserving. It does not erase the blemish that placed this name in the ledger.#!"
 breedimp_dynasty_cleanup.1001.a: "“Get out of my dynasty!”"
 breedimp_dynasty_cleanup.1001.a.tt: "Add this person to the exile list."
 breedimp_dynasty_cleanup.1001.b: "“Very well. I’ll spare you.”"
 breedimp_dynasty_cleanup.1001.b.tt: "Spare this person and continue to the next."
 breedimp_dynasty_cleanup.1001.c: "“That will do for now.”"
 breedimp_dynasty_cleanup.1001.c.tt: "Keep the current list and proceed to final confirmation."
 breedimp_dynasty_cleanup.1001.d: "“Enough. Exile them all.”"
 breedimp_dynasty_cleanup.1001.d.tt: "Add the current and all remaining candidates, then proceed to final confirmation. Anyone already spared remains spared."

 breedimp_dynasty_cleanup.1002.t: "Confirm Dynasty Cleanup"
 breedimp_dynasty_cleanup.1002.desc.selected: "My steward closes the ledger and keeps one finger pressed firmly upon its cover.\n\n‘My liege, the list has been arranged exactly to your wishes. You need only give the word; what remains is merely a necessary correction to the family record.’"
 breedimp_dynasty_cleanup.1002.desc.empty: "No candidates were selected. Close this review to leave every Dynasty membership unchanged."
 breedimp_dynasty_cleanup.1002.a: "“So be it!”"
 breedimp_dynasty_cleanup.1002.b: "“I’ll think on it.”"
 breedimp_dynasty_cleanup.1002.confirm.tt: "Exile the listed characters and their descendants."
 breedimp_dynasty_cleanup.1002.cancel.tt: "End the cleanup without making any changes."
